<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

    <!-- Google Fonts API -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap"
      rel="stylesheet"
    />

    <title>Desktop Toolbox - Utilities for Windows</title>

    <style>
      #root {
        flex-grow: 1;
      }

      html {
        height: 100%;
      }

      body {
        width: 100%;
      }

      html,
      body,
      #root {
        display: flex;
        margin: 0;
        padding: 0;
        background-color: #161619;
      }

      /* Diagonal carbon-weave texture */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.035;
        background-image:
          repeating-linear-gradient(
            135deg,
            transparent,
            transparent 2px,
            rgba(255, 255, 255, 0.03) 2px,
            rgba(255, 255, 255, 0.03) 4px
          );
        pointer-events: none;
      }

      /* Subtle vignette */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 50%, rgba(0, 0, 0, 0.3) 100%);
        pointer-events: none;
      }
    </style>
  </head>

  <script type="module" src="/src/renderer/index.tsx"></script>

  <body>
    <div id="root"></div>
  </body>
</html>
